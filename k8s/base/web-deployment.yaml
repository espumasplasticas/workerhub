apiVersion: apps/v1
kind: Deployment
metadata:
  name: workerhub-web
  namespace: workerhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workerhub-web
  template:
    metadata:
      labels:
        app: workerhub-web
    spec:
      containers:
        - name: php-fpm
          image: ghcr.io/comodisimos/workerhub-php-k8s:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: workerhub-config
            - secretRef:
                name: workerhub-secrets
          ports:
            - containerPort: 9000
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
        - name: nginx
          image: ghcr.io/comodisimos/workerhub-nginx-k8s:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /login
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
